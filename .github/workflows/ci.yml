name: "Generate output"

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"
      - ".github/workflows/ci.yml"
      - "pedalboard-hw.kibot.yaml"
      - "site/**"
  pull_request:
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"
      - ".github/workflows/ci.yml"
      - "pedalboard-hw.kibot.yaml"
  repository_dispatch:
    types: [run_qs]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Install rsync
        run: |
          apt-get update -qq && apt-get install -y -qq rsync > /dev/null 2>&1

      - name: KiBot
        run: |
          kibot -e pedalboard-hw.kicad_sch -d generated

      - name: Remove 3D Model (too large for github)
        run: |
          rm -f generated/3D/pedalboard-hw-3D.step

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated_outputs
          path: generated

      - name: Deploy latest to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: generated
          target-folder: latest
          clean-exclude: |
            v*
            index.html
            versions.json

      - name: Build landing page
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin gh-pages:gh-pages || true
          VERSIONS=$(git ls-tree --name-only gh-pages | grep -E '^v' | sort -rV)
          mkdir -p landing
          echo '["latest"' > landing/versions.json
          for v in $VERSIONS; do echo ",\"$v\"" >> landing/versions.json; done
          echo ']' >> landing/versions.json
          cp site/index.html landing/index.html

      - name: Deploy landing page
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: landing
          clean: false

      - name: Deploy versioned to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: generated
          target-folder: ${{ github.ref_name }}
          clean-exclude: |
            v*
            latest
            index.html
            versions.json
