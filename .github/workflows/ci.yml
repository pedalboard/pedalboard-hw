name: "Hardware CI"

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"
      - "*.kibot.yaml"
      - "site/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "*.kicad_sch"
      - "*.kicad_pcb"

permissions:
  contents: write

jobs:
  site:
    uses: laenzlinger/hugo-kicad-site/.github/workflows/kicad-site.yml@main
    with:
      project_name: "pedalboard-hw"
      schematic: "pedalboard-hw.kicad_sch"
      pcb: "pedalboard-hw.kicad_pcb"
      kibot_config: "pedalboard-hw.kibot.yaml"
      site_base_url: "https://pedalboard.github.io/pedalboard-hw"
      container_image: "ghcr.io/inti-cmnb/kicad10_auto_full:dev"
      kibot_install: "apt-get install -y -qq kicad-packages3d > /dev/null 2>&1"
