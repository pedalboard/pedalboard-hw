{{ partial "version-picker.html" . }}
<style>
footer.footer { flex-wrap: wrap; justify-content: center; }
footer.footer > span:last-of-type { display: none; }
footer.footer > span:first-of-type::after { content: none; }
.footer-badges { width: 100%; text-align: center; order: -1; padding-bottom: 0.3rem; display: flex; gap: 0.4rem; justify-content: center; }
</style>
<div class="footer-badges">
{{ with .Site.Params.oshwaID }}<a href="https://certification.oshwa.org/{{ . | lower }}.html"><img src="https://img.shields.io/badge/OSHWA-{{ . }}-blue" alt="OSHWA {{ . }}"></a>{{ end }}
{{ with .Site.Params.license }}<img src="https://img.shields.io/badge/License-{{ . | replaceRE `[-.]` "--" }}-green" alt="License: {{ . }}">{{ end }}
</div>
