<button class="viewer-fullscreen-btn" aria-label="Toggle fullscreen" onclick="var w=this.parentElement;var d=document;var fs=d.fullscreenElement||d.webkitFullscreenElement;if(w.classList.contains('viewer-wrap--fullscreen')){w.classList.remove('viewer-wrap--fullscreen')}else if(fs){(d.exitFullscreen||d.webkitExitFullscreen).call(d)}else if(w.requestFullscreen||w.webkitRequestFullscreen){(w.requestFullscreen||w.webkitRequestFullscreen).call(w)}else{w.classList.add('viewer-wrap--fullscreen')}">⛶</button>
